name: Deploy naar GitHub Pages

# Deployt naar de gh-pages-branch. GitHub activeert Pages automatisch
# zodra die branch bestaat; er is geen handmatige Pages-configuratie nodig.

on:
  push:
    branches:
      - main
      - claude/vast-en-zeker-pwa-79id1o
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
